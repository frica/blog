    <style>
        /* Base styles - copied from themes/mytheme/static/css/style.css */
        @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans');

        @font-face {
          font-family: iA Writer Mono;
          font-style: normal;
          font-display: swap;
          font-weight: 400;
          src: url(https://cdn.jsdelivr.net/fontsource/fonts/ia-writer-mono@latest/latin-400-normal.woff2) format("woff2"),
            url(https://cdn.jsdelivr.net/fontsource/fonts/ia-writer-mono@latest/latin-400-normal.woff) format("woff");
        }

        @font-face {
          font-family: iA Writer Mono;
          font-style: normal;
          font-display: swap;
          font-weight: 700;
          src: url(https://cdn.jsdelivr.net/fontsource/fonts/ia-writer-mono@latest/latin-700-normal.woff2) format("woff2"),
            url(https://cdn.jsdelivr.net/fontsource/fonts/ia-writer-mono@latest/latin-700-normal.woff) format("woff");
        }

        :root {
          --white: #efefef;
          --transwhite: rgba(239, 239, 239, 0.7);
          --moretranswhite: rgba(239, 239, 239, 0.1);
          --black: #252525;
          --transblack: rgba(37, 37, 37, 0.7);
          --moretransblack: rgba(37, 37, 37, 0.1);
          --gray: #6b6b6b;
          --highlight: #e5ffc3;
          --red: #e4002b;
          --green: #24d05a;
          --pink: #eb4888;
          --blue: #10a2f5;
          --yellow: #e9bc3f;
        }

        ::selection {
          background-color: var(--highlight);
          color: var(--black);
        }

        html,
        body {
          margin: auto;
          padding: 20px;
          max-width: 75ch;
          background-color: var(--white);
          word-wrap: break-word;
          overflow-wrap: break-word;
          color: var(--black);
        }

        html,
        body,
        button,
        code {
          font-family: 'IBM Plex Mono', 'Menlo', 'Monaco', monospace;
          font-size: 18px;
        }

        h1,
        strong,
        b {
          color: var(--black);
        }

        h2,
        h3,
        h4,
        h5,
        h6 {
          color: var(--gray);
          line-height: 1.1;
        }

        header {
          position: relative;
        }

        a {
          color: var(--black);
          text-decoration-thickness: 0.3ex;
          text-underline-offset: 0.3ex;
        }

        nav {
          position: sticky;
          top: 0;
          text-align: center;
          background: var(--transwhite);
          -webkit-backdrop-filter: blur(1px);
          backdrop-filter: blur(1px);
        }

        nav ul {
          list-style: none;
          padding: 0;
          margin: 0;
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 12px;
        }

        nav li {
          margin: 0;
        }

        nav a {
          margin: 25px 0;
          padding: 0 12px 0 0;
        }

        .center {
          text-align: center;
        }

        .header-title {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 20px;
        }

        .title-image {
          width: 64px;
          height: 64px;
        }

        .social-media-list {
          display: flex;
          justify-content: center;
          gap: 15px;
          margin: 20px 0;
        }

        .social-media-icon {
          transition: opacity 0.2s;
        }

        .social-media-icon:hover {
          opacity: 0.7;
        }

        footer {
          text-align: center;
          margin-top: 40px;
          padding-top: 20px;
          border-top: 1px dashed var(--gray);
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
          ::selection {
            background-color: #0f0f0f;
            color: var(--white);
          }

          :root {
            --gray: #a4a4a4;
          }

          html,
          body,
          body button,
          body h1,
          body strong,
          body b,
          body em,
          body blockquote {
            background: var(--black);
            color: var(--white);
          }

          body nav {
            background: var(--transblack);
          }

          body code {
            background-color: var(--moretranswhite);
          }

          body a {
            color: var(--white);
          }
        }

        /* Main content styling */
        main {
          margin: 40px 0;
          line-height: 1.6;
        }

        .content {
          text-align: center;
        }

        .redirect-message {
          background: var(--moretranswhite);
          padding: 20px;
          border-radius: 8px;
          margin: 20px 0;
        }
    </style>

    <script>
        let colors = ["#24d05a", "#eb4888", "#10a2f5", "#e9bc3f"];

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function setRandomLinkColor() {
            Array.from(document.getElementsByTagName("a")).forEach((e) => {
                e.style.textDecorationColor = getRandomColor();
            });
        }

        function setColorHoverListener() {
            Array.from(document.querySelectorAll("a, button")).forEach((e) => {
                e.addEventListener("mouseover", setRandomLinkColor);
            });
        }

        (function () {
            setRandomLinkColor();
            setColorHoverListener();
        })();
    </script>
